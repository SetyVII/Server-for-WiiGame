<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Control WiiCell</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div id="status" class="disconnected">Desconectado</div>

        <div id="server-config">
            <div style="font-size: 12px; color: #aaa; margin-bottom: 4px;">Dirección del Servidor WebSocket</div>
            <input type="text" id="ws-address-input" placeholder="ws://localhost:3003" />
            <button id="connect-btn">Conectar</button>
        </div>

        <div class="controller-layout">
            <!-- Pad Direccional -->
            <div class="d-pad">
                <button class="btn-up" data-x="0" data-y="1">W</button>
                <button class="btn-left" data-x="-1" data-y="0">A</button>
                <button class="btn-right" data-x="1" data-y="0">D</button>
                <button class="btn-down" data-x="0" data-y="-1">S</button>
            </div>

            <!-- Botones de Acción -->
            <div class="action-pad">
                <button class="btn-b">B</button>
                <button class="btn-a">A</button>
            </div>
        </div>

        <div id="log">Esperando inputs...</div>

        <div id="mic-section">
            <div id="mic-label">
                Volumen: <span id="mic-status">inactivo</span>
            </div>
            <div id="volume-bar-container">
                <div id="volume-bar"></div>
            </div>
        </div>

        <div id="sensor-section">
            <div id="sensor-btn-container">
                <button id="start-sensor-btn">
                    Activar Sensores para Jugar
                </button>
            </div>
            <div id="sensor-data">
                γ <span id="sensor-gamma">--</span> &nbsp; β
                <span id="sensor-beta">--</span>
            </div>
        </div>
        
        <script src="script.js"></script>
    </body>
</html>

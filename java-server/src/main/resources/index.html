        <style>
/* ============================================
   VARIABLES CSS - TEMAS
   ============================================ */
:root {
    /* Tema Oscuro (default) */
    --bg-primary: #1A1A2E;
    --bg-surface: #16213E;
    --bg-surface-variant: #0B1320;
    --text-primary: #EEEEEE;
    --text-secondary: #AAAAAA;
    --border-color: #444;
    
    /* Colores fijos (no cambian con tema) */
    --color-primary: #E94560;
    --color-primary-hover: #C73E54;
    --color-secondary: #0F3460;
    --color-tertiary: #9333EA;
    --color-button-b: #EA580C;
    --color-success: #22C55E;
    --color-error: #EF4444;
    --color-info: #00A8FF;
    --color-player-2: #E84118;
    
    /* TopBar siempre oscuro */
    --topbar-bg: #16213E;
    --topbar-text: #EEEEEE;
}

.theme-light {
    /* Tema Claro */
    --bg-primary: #F5F5F5;
    --bg-surface: #FFFFFF;
    --bg-surface-variant: #E8E8E8;
    --text-primary: #333333;
    --text-secondary: #666666;
    --border-color: #CCCCCC;
    
    /* TopBar siempre oscuro, incluso en claro */
    --topbar-bg: #16213E;
    --topbar-text: #EEEEEE;
}

/* RESET Y BASE */
* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background-color: var(--bg-primary);
    color: var(--text-primary);
    margin: 0;
    padding: 0;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    touch-action: none;
    user-select: none;
}

/* Material Symbols */
.material-symbols-rounded {
    font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24;
    font-size: 20px;
    line-height: 1;
    vertical-align: middle;
}

/* SISTEMA DE PANTALLAS */
.screen {
    display: none;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

.screen.active {
    display: flex;
    flex-direction: column;
}

/* CONTROLLER */
#screen-controller {
    background-color: var(--bg-primary);
}

/* TopBar */
.top-bar {
    background-color: var(--topbar-bg);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    gap: 8px;
    flex-shrink: 0;
}

.status-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.socket-status {
    font-size: 12px;
    color: #AAAAAA;
}

.socket-status.connected {
    color: #22C55E;
}

.player-status {
    font-size: 12px;
    font-weight: bold;
    color: #CCCCCC;
}

.player-status.player-1 {
    color: #00A8FF;
}

.player-status.player-2 {
    color: #E84118;
}

.btn-toggle-sensors {
    background-color: var(--color-primary);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0 12px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 36px;
    margin: 0 auto; /* Centrado en la barra */
}

.btn-toggle-sensors.active {
    background-color: var(--color-error);
}

.top-actions-desktop {
    display: flex;
    align-items: center;
    gap: 4px;
}

.top-actions-mobile {
    display: none;
}

.bottom-bar {
    display: none;
    background-color: var(--topbar-bg);
    padding: 8px 12px;
    justify-content: center;
    gap: 8px;
    flex-shrink: 0;
}

.icon-btn {
    background: none;
    border: none;
    color: var(--topbar-text);
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
}

.icon-btn .material-symbols-rounded {
    font-size: 20px;
}

.icon-btn:hover {
    background-color: rgba(255, 255, 255, 0.1);
}

.btn-disconnect {
    background-color: var(--color-error);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    height: 36px;
}

.btn-disconnect.inactive {
    background-color: var(--color-success);
}

/* Calibración */
.calibration-panel {
    background-color: var(--bg-surface);
    padding: 8px 16px;
    flex-shrink: 0;
}

.calibration-panel.hidden {
    display: none;
}

.calibration-text {
    font-size: 12px;
    color: var(--color-primary);
    text-align: center;
    margin-bottom: 4px;
}

.calibration-bar {
    width: 100%;
    height: 8px;
    background-color: var(--bg-surface-variant);
    border-radius: 4px;
    overflow: hidden;
}

.calibration-progress {
    height: 100%;
    background-color: var(--color-primary);
    border-radius: 4px;
    transition: width 0.1s;
    width: 0%;
}

.calibration-percent {
    font-size: 11px;
    color: var(--text-secondary);
    text-align: center;
    margin-top: 2px;
}

/* Debug info */
.debug-info {
    text-align: center;
    font-size: 11px;
    color: var(--text-secondary);
    padding: 4px 16px;
    font-family: monospace;
    flex-shrink: 0;
}

.debug-info.hidden {
    display: none;
}

/* Panel de micrófono */
.mic-panel {
    background-color: var(--bg-surface-variant);
    border-radius: 12px;
    margin: 0 16px 8px;
    padding: 12px;
    flex-shrink: 0;
}

.mic-panel.hidden {
    display: none;
}

.mic-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
}

.mic-header span {
    font-size: 12px;
    color: var(--text-secondary);
    width: 60px;
}

.volume-display {
    flex: 1;
    height: 20px;
    background-color: var(--bg-primary);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
}

.volume-bar {
    height: 100%;
    width: 0%;
    background-color: var(--color-success);
    border-radius: 10px;
    transition: width 0.1s, background-color 0.2s;
}

.volume-bar.medium {
    background-color: #EAB308;
}

.volume-bar.high {
    background-color: var(--color-error);
}

.rms-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 11px;
    color: var(--text-primary);
    font-weight: bold;
}

.blow-indicator {
    text-align: center;
    color: var(--color-error);
    font-size: 14px;
    font-weight: bold;
    margin: 4px 0;
}

.blow-indicator.hidden {
    display: none;
}

.mic-sliders {
    display: flex;
    gap: 8px;
    margin-top: 8px;
}

.slider-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.slider-group label {
    font-size: 11px;
    color: var(--text-secondary);
}

.slider-group input[type="range"] {
    width: 100%;
    height: 20px;
}

.slider-group span {
    font-size: 11px;
    color: var(--color-primary);
}

/* Área principal del controller */
.controller-main {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 48px;
    flex: 1;
    padding: 16px 124px 16px 24px; /* 100px extra a la derecha para compensar btn-b */
    min-height: 0;
    position: relative;
}

/* Contador de pickups flotante */
.pickup-counter {
    position: absolute;
    top: 16px;
    right: 16px;
    background-color: #0F3460;
    border: 2px solid #FFD700;
    border-radius: 12px;
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 18px;
    font-weight: bold;
    color: #FFD700;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    user-select: none;
}

.pickup-counter .material-symbols-rounded {
    font-size: 20px;
    color: #FFD700;
}

/* Control Area (D-Pad o Touchpad) */
.control-area {
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Touchpad - Altura = 2 botones + gap = height */
.touchpad-container {
    width: auto;
    height: 256px;
    max-width: 60vw;
    aspect-ratio: 380 / 256;
}

.touchpad-container.hidden {
    display: none;
}

.touchpad {
    width: 100%;
    height: 100%;
    background-color: #0F3460;
    border: 4px solid #E94560;
    border-radius: 20px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: background-color 0.3s ease, border-color 0.3s ease, opacity 0.3s ease;
}

.touchpad.disabled {
    opacity: 0.4;
    background-color: #2a2a3e;
    border-color: #555;
    cursor: not-allowed;
}

.touchpad.disabled .touchpad-dot {
    background-color: #888;
    opacity: 0.6;
}

.touchpad-dot {
    width: 48px;
    height: 48px;
    background-color: #E94560;
    border-radius: 50%;
    position: absolute;
    transition: transform 0.05s, background-color 0.3s ease, opacity 0.3s ease;
    transform: translate(0, 0);
}

/* D-Pad (Modo botones) - Tamaño = 2 botones A/B + gap */
.d-pad {
    display: grid;
    grid-template-columns: 80px 80px 80px;
    grid-template-rows: 80px 80px 80px;
    gap: 8px;
    width: 256px;  /* 120*2 + 16 */
    height: 256px; /* 120*2 + 16 */
}

.d-pad.hidden {
    display: none;
}

.d-pad button {
    background-color: #0F3460;
    color: white;
    border: 2px solid #E94560;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
}

.d-pad button:active {
    background-color: #1a4a7a;
    border-color: #ff6b6b;
}

.d-pad button:disabled {
    background-color: #333;
    border-color: #444;
    color: #666;
    cursor: not-allowed;
}

.btn-up {
    grid-column: 2;
    grid-row: 1;
}

.btn-left {
    grid-column: 1;
    grid-row: 2;
}

.btn-right {
    grid-column: 3;
    grid-row: 2;
}

.btn-down {
    grid-column: 2;
    grid-row: 3;
}

/* Botones de Acción */
.action-buttons {
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
    justify-content: center;
}

.btn-action {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: white;
    font-weight: bold;
    touch-action: manipulation;
    transition: transform 0.1s;
}

.btn-action:active {
    transform: scale(0.95);
}

.btn-action .btn-letter {
    font-size: 32px;
    line-height: 1;

 .mode-icon {

/* ============================================

@media (max-width: 600px) {

        left: 50px;

const AppState = {
    currentScreen: 'connection',

    myPlayerId: null,
    reconnectTimeout: null,
    currentWsUrl: '',
    
    // Sensores
    sensorsActive: false,
    sensorOffset: { gamma: 0, beta: 0 },
    isCalibrating: false,
    calibrationProgress: 0,
    lastSensorTime: 0,
    SENSOR_TICK_RATE: 50,
    
    // Input
    currentInput: {
        type: 'input',
        gamma: 0,
        beta: 0,
        dpadX: 0,
        dpadY: 0,
        btnA: false,
        btnB: false,
        isYelling: false,
    },
    
    // Micrófono
    isYelling: false,
    audioContext: null,
    analyser: null,
    microphone: null,
    micActive: false,
    
    // Settings
    settings: {
        darkMode: false,
        controlMode: 'touchpad', // 'touchpad' | 'buttons'
        sensitivity: 'medium', // 'low' | 'medium' | 'high' | 'custom'
        customForce: 45,
    },
    
    // Touchpad
    isDragging: false,
    manualOffset: { x: 0, y: 0 },
    
    // Envío de datos
    sendingInput: true,
    
    // Contador de pickups (monedas)
    pickupCount: 0,
};

// ============================================
// NAVEGACIÓN ENTRE PANTALLAS
// ============================================
function showScreen(screenName) {
    // Ocultar todas las pantallas
    document.querySelectorAll('.screen').forEach(screen => {
        screen.classList.remove('active');
    });
    
    // Mostrar la pantalla solicitada
    const targetScreen = document.getElementById(`screen-${screenName}`);
    if (targetScreen) {
        targetScreen.classList.add('active');
        AppState.currentScreen = screenName;
    }
}

// ============================================
// PANTALLA 1: CONTROLLER
// ============================================
const controllerScreen = {
    elements: {},
    
    init() {
        this.cacheElements();
        this.bindEvents();
        this.updateUI();
    },
    
    autoConnect(url) {
        AppState.currentWsUrl = url;
        
        if (AppState.ws) {
            try { AppState.ws.close(); } catch(e) {}
        }
        
        AppState.ws = new WebSocket(url);
        
        AppState.ws.onopen = () => {
            this.logEvent('Conectado. Esperando rol...');
            AppState.ws.send(JSON.stringify({ type: 'join' }));
        };
        
        AppState.ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            this.handleServerMessage(data);
        };
        
        AppState.ws.onerror = () => {
            this.logEvent('Error de conexión');
            this.updateUI();
        };
        
        AppState.ws.onclose = () => {
            this.handleDisconnect();
        };
        
        this.updateUI();
    },
    
    cacheElements() {
        this.elements = {
            socketStatus: document.getElementById('socket-status'),
            playerStatus: document.getElementById('player-status'),
            toggleSensorsBtn: document.getElementById('toggle-sensors-btn'),

    bindTouchpadEvents() {
        const touchpad = this.elements.touchpad;
        let maxRadiusX, maxRadiusY;
        
        const updateDimensions = () => {
            const rect = touchpad.getBoundingClientRect();
            maxRadiusX = rect.width / 2 * 0.75;
            maxRadiusY = rect.height / 2 * 0.75;
        };
        
        const handleStart = (e) => {
            if (AppState.sensorsActive) return;
            e.preventDefault();
            AppState.isDragging = true;
            updateDimensions();
            
            const rect = touchpad.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            AppState.manualOffset.x = clientX - rect.left - rect.width / 2;
            AppState.manualOffset.y = clientY - rect.top - rect.height / 2;
            
            this.clampAndUpdateTouchpad();
        };
        
        const handleMove = (e) => {
            if (!AppState.isDragging) return;
            e.preventDefault();
            
            const rect = touchpad.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            AppState.manualOffset.x = clientX - rect.left - rect.width / 2;
            AppState.manualOffset.y = clientY - rect.top - rect.height / 2;
            
            this.clampAndUpdateTouchpad();
        };
        
        const handleEnd = () => {
            AppState.isDragging = false;
            AppState.manualOffset = { x: 0, y: 0 };
            AppState.currentInput.gamma = 0;
            AppState.currentInput.beta = 0;
            // Resetear valores de botones también
            AppState.currentInput.dpadX = 0;
            AppState.currentInput.dpadY = 0;
            this.sendInput();
            this.updateTouchpadVisual();
        };
        
        touchpad.addEventListener('pointerdown', handleStart);
        touchpad.addEventListener('pointermove', handleMove);
        touchpad.addEventListener('pointerup', handleEnd);
        touchpad.addEventListener('pointerleave', handleEnd);
        touchpad.addEventListener('touchstart', handleStart, { passive: false });
        touchpad.addEventListener('touchmove', handleMove, { passive: false });
        touchpad.addEventListener('touchend', handleEnd);
    },
    
    clampAndUpdateTouchpad() {
        const touchpad = this.elements.touchpad;
        const rect = touchpad.getBoundingClientRect();
        const maxRadiusX = rect.width / 2 * 0.75;
        const maxRadiusY = rect.height / 2 * 0.75;
        
        let { x, y } = AppState.manualOffset;
        
        const normalizedX = x / maxRadiusX;
        const normalizedY = y / maxRadiusY;
        const dist = Math.sqrt(normalizedX * normalizedX + normalizedY * normalizedY);
        
        if (dist > 1) {
            x = x / dist;
            y = y / dist;
            AppState.manualOffset = { x, y };
        }
        
        const gamma = (x / maxRadiusX).clamp(-1, 1);
        const beta = -(y / maxRadiusY).clamp(-1, 1);
        
        // Resetear valores de botones al usar touchpad
        AppState.currentInput.dpadX = 0;
        AppState.currentInput.dpadY = 0;
        AppState.currentInput.gamma = gamma;
        AppState.currentInput.beta = beta;
        this.sendInput();
        this.updateTouchpadVisual();
    },
    
    updateTouchpadVisual() {
        const dot = this.elements.touchpadDot;
        
        if (AppState.sensorsActive) {
            // Usar valores de sensores
            const gamma = AppState.currentInput.gamma;
            const beta = AppState.currentInput.beta;
            const x = gamma * 100; // %
            const y = -beta * 100; // %
            dot.style.transform = `translate(${x}%, ${y}%)`;
        } else if (AppState.isDragging) {
            // Usar offset manual
            const touchpad = this.elements.touchpad;
            const rect = touchpad.getBoundingClientRect();
            const x = (AppState.manualOffset.x / (rect.width / 2)) * 100;
            const y = (AppState.manualOffset.y / (rect.height / 2)) * 100;
            dot.style.transform = `translate(${x}%, ${y}%)`;
        } else {
            dot.style.transform = 'translate(0, 0)';
        }
    },
    
    bindDPadEvents() {
        const buttons = document.querySelectorAll('.d-pad button');
        
        buttons.forEach(btn => {
            const x = parseFloat(btn.getAttribute('data-x'));
            const y = parseFloat(btn.getAttribute('data-y'));
            
            const handlePress = () => {
                if (AppState.sensorsActive) return;
                // Resetear valores del touchpad al usar botones
                AppState.currentInput.gamma = x; // Mapeo de dpadX a gamma para Unity
                AppState.currentInput.beta = 0;
                AppState.currentInput.dpadX = x;
                AppState.currentInput.dpadY = y;
                this.sendInput();
            };
            
            const handleRelease = () => {
                AppState.currentInput.gamma = 0;
                AppState.currentInput.beta = 0;
                AppState.currentInput.dpadX = 0;
                AppState.currentInput.dpadY = 0;
                this.sendInput();
            };
            
            btn.addEventListener('pointerdown', handlePress);
            btn.addEventListener('pointerup', handleRelease);
            btn.addEventListener('pointerleave', handleRelease);
        });
    },
    
    bindActionButtons() {
        const btnA = document.querySelector('.btn-action.btn-a');
        const btnB = document.querySelector('.btn-action.btn-b');
        
        const bindButton = (btn, key) => {
            const handlePress = () => {
                AppState.currentInput[key] = true;
                this.sendInput();
            };
            const handleRelease = () => {
                AppState.currentInput[key] = false;
                this.sendInput();
            };
            
            btn.addEventListener('pointerdown', handlePress);
            btn.addEventListener('pointerup', handleRelease);
            btn.addEventListener('pointerleave', handleRelease);
        };
        
        bindButton(btnA, 'btnA');
        bindButton(btnB, 'btnB');
    },

        });

    startSensors() {
        if (typeof DeviceOrientationEvent === 'undefined') {
            this.showError('Error al enviar datos de sensores.');
            return;
        }
        
        // Pedir permiso en iOS 13+
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        this.activateSensors();
                    } else {
                        this.showError('Permiso denegado para usar los sensores');
                    }
                })
                .catch(err => {
                    console.error('Error solicitando permiso:', err);
                    this.showError('Error al acceder a los sensores');
                });
        } else {
            this.activateSensors();
        }
    },
    
    activateSensors() {
        AppState.sensorsActive = true;
        AppState.isCalibrating = true;
        AppState.calibrationProgress = 0;
        
        // Mostrar panel de calibración
        this.elements.calibrationPanel.classList.remove('hidden');
        this.elements.debugInfo.classList.remove('hidden');
        
        // Tomar posición actual como centro
        const handleOrientation = (event) => {
            if (!AppState.sensorsActive) return;
            
            const now = Date.now();
            if (now - AppState.lastSensorTime < AppState.SENSOR_TICK_RATE) return;
            AppState.lastSensorTime = now;
            
            const gamma = event.gamma || 0;
            const beta = event.beta || 0;
            
            if (AppState.isCalibrating) {
                // Primera lectura = centro
                AppState.sensorOffset = { gamma, beta };
                AppState.isCalibrating = false;
                this.elements.calibrationPanel.classList.add('hidden');
            }
            
            // Aplicar offset
            const calibratedGamma = gamma - AppState.sensorOffset.gamma;
            const calibratedBeta = beta - AppState.sensorOffset.beta;
            
            // Mapear a [-1, 1]
            const maxAngle = 40;
            const mappedGamma = (calibratedGamma / maxAngle).clamp(-1, 1);
            const mappedBeta = (calibratedBeta / maxAngle).clamp(-1, 1);
            
            AppState.currentInput.gamma = mappedGamma;
            AppState.currentInput.beta = mappedBeta;
            
            // Actualizar debug
            this.elements.debugTiltX.textContent = mappedGamma.toFixed(2);
            this.elements.debugTiltY.textContent = mappedBeta.toFixed(2);
            
            // Actualizar visual del touchpad
            this.updateTouchpadVisual();
            
            // Enviar input
            this.sendInput();
        };
        
        window.addEventListener('deviceorientation', handleOrientation);
        this._orientationHandler = handleOrientation;
        
        this.updateUI();
    },
    
    stopSensors() {
        AppState.sensorsActive = false;
        AppState.isCalibrating = false;
        
        if (this._orientationHandler) {
            window.removeEventListener('deviceorientation', this._orientationHandler);
            this._orientationHandler = null;
        }
        
        AppState.currentInput.gamma = 0;
        AppState.currentInput.beta = 0;
        this.sendInput();
        
        this.elements.calibrationPanel.classList.add('hidden');
        this.elements.debugInfo.classList.add('hidden');
        this.updateUI();
    },
    
    startMicrophone() {
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                AppState.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                AppState.analyser = AppState.audioContext.createAnalyser();
                AppState.analyser.fftSize = 256;
                AppState.microphone = AppState.audioContext.createMediaStreamSource(stream);
                AppState.microphone.connect(AppState.analyser);
                
                AppState.micActive = true;
                this.elements.micPanel.classList.remove('hidden');
                this.elements.micIcon.textContent = 'mic';
                this.elements.toggleMicBtn.style.color = '#EF4444';
                if (this.elements.toggleMicBtnMobile) {
                    this.elements.toggleMicBtnMobile.style.color = '#EF4444';
                }
                if (this.elements.micIconMobile) {
                    this.elements.micIconMobile.textContent = 'mic';
                }
                
                this.measureVolume();
            })
            .catch(err => {
                console.error('Error al acceder al micrófono:', err);
                this.showError('Error al acceder al micrófono');
            });
    },
    
    stopMicrophone() {
        AppState.micActive = false;
        if (AppState.audioContext) {
            AppState.audioContext.close();
            AppState.audioContext = null;
        }
        this.elements.micPanel.classList.add('hidden');
        this.elements.micIcon.textContent = 'mic_off';
        this.elements.toggleMicBtn.style.color = '';
        if (this.elements.toggleMicBtnMobile) {
            this.elements.toggleMicBtnMobile.style.color = '';
        }
        if (this.elements.micIconMobile) {
            this.elements.micIconMobile.textContent = 'mic_off';
        }
        AppState.currentInput.isYelling = false;
        this.sendInput();
    },
    
    measureVolume() {
        if (!AppState.micActive || !AppState.analyser) return;
        
        requestAnimationFrame(() => this.measureVolume());
        
        const dataArray = new Uint8Array(AppState.analyser.frequencyBinCount);
        AppState.analyser.getByteFrequencyData(dataArray);
        
        let sum = 0;
        for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
        const average = sum / dataArray.length;
        
        const threshold = parseInt(this.elements.thresholdSlider.value);
        const scale = parseFloat(this.elements.scaleSlider.value);
        const progress = Math.min((average / 255) * 100 * scale / 3.33, 100);
        
        // Actualizar barra visual
        this.elements.micVolumeBar.style.width = `${progress}%`;
        this.elements.micRms.textContent = `${Math.round(progress)}%`;
        
        // Color según intensidad
        this.elements.micVolumeBar.classList.remove('medium', 'high');
        if (progress > 80) {
            this.elements.micVolumeBar.classList.add('high');
        } else if (progress > 50) {
            this.elements.micVolumeBar.classList.add('medium');
        }
        
        // Detectar "soplo"
        const isBlowing = average > threshold;
        if (isBlowing !== AppState.isYelling) {
            AppState.isYelling = isBlowing;
            AppState.currentInput.isYelling = isBlowing;
            this.sendInput();
        }
        
        if (isBlowing) {
            this.elements.blowIndicator.classList.remove('hidden');
        } else {
            this.elements.blowIndicator.classList.add('hidden');
        }
    },
    
    testVibration() {
        console.log('[testVibration] Intentando vibrar...');

        // Feedback visual inmediato (parpadeo del botón)
        const btns = [
            this.elements.testVibrationBtn,
            this.elements.testVibrationBtnMobile
        ].filter(Boolean);

        btns.forEach(btn => {
            btn.style.backgroundColor = '#E94560';
            setTimeout(() => {
                btn.style.backgroundColor = '';
            }, 200);
        });

        // Vibración larga para gama baja (1001ms para no ignorarla)
        if ('vibrate' in navigator) {
            try {
                const result = navigator.vibrate(1001);
                console.log('[testVibration] navigator.vibrate() devolvió:', result);
                this.logEvent('📳 Vibración de prueba');
            } catch (err) {
                console.warn('Error al vibrar:', err);
                this.showError('Vibración no disponible en este dispositivo');
            }
        } else {
            console.warn('[testVibration] navigator.vibrate no está disponible');
            this.showError('Tu navegador no soporta vibración');
        }
    },
    
    // ── Eventos de Unity ──────────────────────────────────────────
    //    Los usaremos para mostrar feedback visual, vibración, y eventos de juego específicos (como inicio de puzzles) mientras jugamos.  
    handleServerMessage(data) {
        switch (data.type) {
            // Rol asignado por el servidor
            case 'assignRole':
                AppState.myPlayerId = data.playerId;
                this.logEvent(`Asignado como Jugador ${data.playerId}`);
                this.updateUI();
                break;
            // Eventos de juego enviados desde Unity
            case 'collision':
                this.logEvent('💥 Choque!');
                this.flashScreen('#ff5151', 150);
                this.vibrate(1001);
                break;
            case 'death':
                this.logEvent('💀 Has muerto!');
                this.flashScreen('#960000', 400);
                this.vibrate([0, 1001]);
                break;
            case 'pickup':
                AppState.pickupCount++;
                this.elements.pickupCount.textContent = AppState.pickupCount;
                this.logEvent(`✨ ${data.pickupType || 'Objeto'} recogido!`);
                this.flashScreen('#00ff88', 150);
                this.vibrate(1001);
                break;
            case 'ui_update':
                this.logEvent(`🖥️ ${data.data || 'Update'}`);
                break;
            case 'screen_effect':
                this.flashScreen(data.color || '#ffffff', data.duration || 200);
                if (data.vibrate) this.vibrate(1001);
                break;
            case 'puzzle_start':
                this.logEvent(`🧩 Puzzle: ${data.puzzleId}`);
                this.vibrate(1001);
                break;
            // Eventos personalizados que Unity puede enviar
            case 'custom':
                this.logEvent(`📨 ${data.data || 'Evento'}`);
                this.vibrate(1001);
                break;
            // Errores enviados desde el servidor
            case 'error':
                this.showError(data.message);
                break;
        }
    },
    
    // ── Manejo de desconexiones ──────────────────────────────────────────
    //    Si la conexión se pierde, mostramos un mensaje de error y tratamos de reconectar automáticamente cada 2 segundos. Esto es útil para conexiones inestables o si el servidor se reinicia.
    handleDisconnect() {
        AppState.myPlayerId = null;
        this.elements.socketStatus.textContent = 'Socket: desconectado';
        this.elements.socketStatus.classList.remove('connected');
        this.elements.playerStatus.textContent = 'Sin rol';
        this.elements.playerStatus.className = 'player-status';
        this.updateUI();
        
        // Auto-reconectar después de 2 segundos
        if (AppState.reconnectTimeout) clearTimeout(AppState.reconnectTimeout);
        AppState.reconnectTimeout = setTimeout(() => {
            if (!AppState.ws || AppState.ws.readyState !== WebSocket.OPEN) {
                this.logEvent('Reconectando...');
                this.autoConnect(AppState.currentWsUrl);
            }
        }, 2000);
    },
    
    // ── Alternar Entrada ──────────────────────────────────────────
    //    Permite activar o desactivar el envío de datos al servidor. Cuando se desactiva, se envía un último mensaje con todos los valores a 0 para evitar que el personaje quede "atorado" con una entrada previa. También muestra un mensaje persistente indicando que el envío está desactivado.
    toggleInput() {
        const screenController = document.getElementById('screen-controller');
        
        if (AppState.sendingInput) {
            // Desactivar envío
            AppState.sendingInput = false;
            
            // Detener sensores
            if (AppState.sensorsActive) {
                this.stopSensors();
            }
            
            // Detener micrófono
            if (AppState.micActive) {
                this.stopMicrophone();
            }
            
            // Resetear valores a neutro
            AppState.currentInput = {
                type: 'input',
                gamma: 0,
                beta: 0,
                dpadX: 0,
                dpadY: 0,
                btnA: false,
                btnB: false,
                isYelling: false,
            };
            AppState.manualOffset = { x: 0, y: 0 };
            
            // Enviar último mensaje con todo en 0
            this.sendInput();
            
            // Añadir clase visual de desactivado
            screenController.classList.add('input-disabled');
            
            // Mensaje persistente (no desaparece)
            this.logEvent('⛔ Envío de datos desactivado', true);
        } else {
            // Activar envío
            AppState.sendingInput = true;
            
            // Quitar clase visual de desactivado
            screenController.classList.remove('input-disabled');
            
            // Limpiar mensaje persistente
            if (this._logTimeout) {
                clearTimeout(this._logTimeout);
                this._logTimeout = null;
            }
            this.elements.eventLog.textContent = '';
            
            this.logEvent('✅ Envío de datos activado');
        }
        
        this.updateUI();
    },
    
    // ── Enviar Entrada ──────────────────────────────────────────
    //    Esta función se encarga de enviar el estado actual de los controles al servidor. Dependiendo del modo de control (touchpad o botones), enviará diferentes datos. También incluye el estado de los botones A/B y si el jugador está "gritando" (soplando el micrófono).
    sendInput() {
        if (!AppState.sendingInput || !AppState.ws || AppState.ws.readyState !== WebSocket.OPEN || !AppState.myPlayerId) return;
        
        const mode = AppState.settings.controlMode;
        let input;
        
        if (mode === 'touchpad') {
            // Modo touchpad: enviar gamma, beta (sin dpadX/Y)
            input = {
                type: 'input',
                gamma: AppState.currentInput.gamma,
                beta: AppState.currentInput.beta,
                dpadX: 0,
                dpadY: 0,
                btnA: AppState.currentInput.btnA,
                btnB: AppState.currentInput.btnB,
                isYelling: AppState.isYelling,
            };
        } else {
            // Modo botones: enviar dpadX, dpadY (sin gamma/beta)
            input = {
                type: 'input',
                gamma: 0,
                beta: 0,
                dpadX: AppState.currentInput.dpadX,
                dpadY: AppState.currentInput.dpadY,
                btnA: AppState.currentInput.btnA,
                btnB: AppState.currentInput.btnB,
                isYelling: AppState.isYelling,
            };
        }
        
        AppState.ws.send(JSON.stringify(input));
    },
    
    updateUI() {
        // Estado del socket
        if (AppState.ws && AppState.ws.readyState === WebSocket.OPEN) {
            this.elements.socketStatus.textContent = 'Socket: conectado';
            this.elements.socketStatus.classList.add('connected');
        } else {
            this.elements.socketStatus.textContent = 'Socket: desconectado';
            this.elements.socketStatus.classList.remove('connected');
        }
        
        // Estado del jugador
        if (AppState.myPlayerId) {
            this.elements.playerStatus.textContent = `Jugador ${AppState.myPlayerId}`;
            this.elements.playerStatus.className = `player-status player-${AppState.myPlayerId}`;
        } else {
            this.elements.playerStatus.textContent = 'Sin rol';
            this.elements.playerStatus.className = 'player-status';
        }
        
        // Botón de sensores (desktop)
        if (AppState.sensorsActive) {
            this.elements.toggleSensorsBtn.textContent = 'Desactivar sensores';
            this.elements.toggleSensorsBtn.classList.add('active');
            this.elements.touchpad.classList.add('disabled');
        } else {
            this.elements.toggleSensorsBtn.textContent = 'Activar sensores';
            this.elements.toggleSensorsBtn.classList.remove('active');
            this.elements.touchpad.classList.remove('disabled');
        }
        
        // Botón de sensores (mobile)
        if (this.elements.toggleSensorsBtnMobile) {
            if (AppState.sensorsActive) {
                this.elements.toggleSensorsBtnMobile.textContent = 'Desactivar sensores';
                this.elements.toggleSensorsBtnMobile.classList.add('active');
            } else {
                this.elements.toggleSensorsBtnMobile.textContent = 'Activar sensores';
                this.elements.toggleSensorsBtnMobile.classList.remove('active');
            }
        }
        
        // Botón Desactivar/Activar envío (desktop)
        if (AppState.sendingInput) {
            this.elements.disconnectBtn.textContent = 'Desactivar';
            this.elements.disconnectBtn.classList.remove('inactive');
        } else {
            this.elements.disconnectBtn.textContent = 'Activar';
            this.elements.disconnectBtn.classList.add('inactive');
        }
        
        // Botón Desactivar/Activar envío (mobile)
        if (this.elements.disconnectBtnMobile) {
            if (AppState.sendingInput) {
                this.elements.disconnectBtnMobile.textContent = 'Desactivar';
                this.elements.disconnectBtnMobile.classList.remove('inactive');
            } else {
                this.elements.disconnectBtnMobile.textContent = 'Activar';
                this.elements.disconnectBtnMobile.classList.add('inactive');
            }
        }
    },
    
    toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.warn('Error al entrar en fullscreen:', err);
            });
        } else {
            document.exitFullscreen();
        }
    },
    
    updateFullscreenIcon() {
        const isFullscreen = !!document.fullscreenElement;
        const icon = isFullscreen ? 'fullscreen_exit' : 'fullscreen';
        if (this.elements.fullscreenIcon) {
            this.elements.fullscreenIcon.textContent = icon;
        }
        if (this.elements.fullscreenIconMobile) {
            this.elements.fullscreenIconMobile.textContent = icon;
        }
    },
    
    updateControlMode() {
        const mode = AppState.settings.controlMode;
        if (mode === 'touchpad') {
            this.elements.touchpadMode.classList.remove('hidden');
            this.elements.buttonsMode.classList.add('hidden');
        } else {
            this.elements.touchpadMode.classList.add('hidden');
            this.elements.buttonsMode.classList.remove('hidden');
        }
        
        // Limpiar valores del modo anterior al cambiar
        if (mode === 'touchpad') {
            AppState.currentInput.dpadX = 0;
            AppState.currentInput.dpadY = 0;
        } else {
            AppState.currentInput.gamma = 0;
            AppState.currentInput.beta = 0;
            AppState.manualOffset = { x: 0, y: 0 };
        }
        this.sendInput();
    },
    
    detectOrientation() {
        const isPortrait = window.innerHeight > window.innerWidth;
        if (isPortrait) {
            this.elements.controllerMain.classList.add('portrait-layout');
        } else {
            this.elements.controllerMain.classList.remove('portrait-layout');
        }
    },
    
    logEvent(message, persistent = false) {
        if (this._logTimeout) {
            clearTimeout(this._logTimeout);
            this._logTimeout = null;
        }
        this.elements.eventLog.textContent = message;
        if (!persistent) {
            this._logTimeout = setTimeout(() => {
                if (this.elements.eventLog.textContent === message) {
                    this.elements.eventLog.textContent = '';
                }
            }, 3000);
        }
    },
    
    showError(message) {
        this.elements.errorMessage.textContent = message;
        this.elements.errorMessage.classList.remove('hidden');
        setTimeout(() => {
            this.elements.errorMessage.classList.add('hidden');
        }, 5000);
    },
    
    flashScreen(color, duration) {
        if (this._flashTimeout) {
            clearTimeout(this._flashTimeout);
        }
        const original = document.body.style.backgroundColor;
        document.body.style.backgroundColor = color;
        this._flashTimeout = setTimeout(() => {
            if (original) {
                document.body.style.backgroundColor = original;
            } else {
                document.body.style.backgroundColor = '';
            }
            this._flashTimeout = null;
        }, duration);
    },
    
    vibrate(pattern) {
        if (navigator.vibrate) navigator.vibrate(pattern);
    }
};

// ============================================
// PANTALLA 3: SETTINGS
// ============================================
const settingsScreen = {
    init() {
        this.bindEvents();
        this.loadSettings();
    },
    
    bindEvents() {
        // Volver
        document.getElementById('back-btn').addEventListener('click', () => {
            showScreen('controller');
        });
        
        // Tema
        document.getElementById('theme-light').addEventListener('click', () => {
            this.setTheme(false);
        });
        document.getElementById('theme-dark').addEventListener('click', () => {
            this.setTheme(true);
        });
        
        // Modo de control
        document.getElementById('mode-touchpad').addEventListener('click', () => {
            this.setControlMode('touchpad');
        });
        document.getElementById('mode-buttons').addEventListener('click', () => {
            this.setControlMode('buttons');
        });
        
        // Sensibilidad
        document.querySelectorAll('.sensitivity-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const level = btn.getAttribute('data-level');
                this.setSensitivity(level);
            });
        });
        
        // Custom force
        document.getElementById('custom-force-input').addEventListener('input', (e) => {
            AppState.settings.customForce = parseInt(e.target.value) || 45;
            this.updateSensitivityDisplay();
        });
    },
    
    loadSettings() {
        const saved = localStorage.getItem('wiicell_settings');
        if (saved) {
            AppState.settings = { ...AppState.settings, ...JSON.parse(saved) };
        }
        
        // Aplicar tema al body
        this.updateThemeUI();
        this.updateControlModeUI();
        this.updateSensitivityUI();
    },
    
    saveSettings() {
        localStorage.setItem('wiicell_settings', JSON.stringify(AppState.settings));
    },
    
    setTheme(dark) {
        AppState.settings.darkMode = dark;
        this.updateThemeUI();
        this.saveSettings();
    },
    
    updateThemeUI() {
        const isDark = AppState.settings.darkMode;
        document.body.classList.toggle('theme-light', !isDark);
        document.body.classList.toggle('theme-dark', isDark);
        document.getElementById('theme-light').classList.toggle('active', !isDark);
        document.getElementById('theme-dark').classList.toggle('active', isDark);
    },
    
    setControlMode(mode) {
        AppState.settings.controlMode = mode;
        this.updateControlModeUI();
        this.saveSettings();
        
        // Actualizar controller (cambia las clases CSS para mostrar/ocultar)
        controllerScreen.updateControlMode();
    },
    
    updateControlModeUI() {
        const mode = AppState.settings.controlMode;
        document.getElementById('mode-touchpad').classList.toggle('active', mode === 'touchpad');
        document.getElementById('mode-buttons').classList.toggle('active', mode === 'buttons');
    },
    

    
    setSensitivity(level) {
        AppState.settings.sensitivity = level;
        this.updateSensitivityUI();
        this.saveSettings();
    },
    
    updateSensitivityUI() {
        const level = AppState.settings.sensitivity;
        
        document.querySelectorAll('.sensitivity-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-level') === level);
        });
        
        // Mostrar/ocultar custom force
        const customContainer = document.getElementById('custom-force-container');
        customContainer.classList.toggle('hidden', level !== 'custom');
        
        this.updateSensitivityDisplay();
    },
    
    updateSensitivityDisplay() {
        const level = AppState.settings.sensitivity;
        const forceMap = {
            low: { label: 'Bajo', force: 0.8 },
            medium: { label: 'Medio', force: 4.5 },
            high: { label: 'Alto', force: 10.0 },
            custom: { label: 'Custom', force: AppState.settings.customForce / 10 }
        };
        
        const info = forceMap[level];
        document.getElementById('current-level').textContent = info.label;
        document.getElementById('current-force').textContent = info.force.toFixed(1);
    }
};

// ============================================
// UTILIDADES
// ============================================
Number.prototype.clamp = function(min, max) {
    return Math.min(Math.max(this, min), max);
};

// ============================================
// INICIALIZACIÓN
// ============================================
document.addEventListener('DOMContentLoaded', () => {
    // Inicializar settings primero (para cargar configuración guardada)
    settingsScreen.init();
    settingsScreen.loadSettings();
    
    // Inicializar controller (ahora ya tiene los settings cargados)
    controllerScreen.init();
    
    // Mostrar pantalla de controller directamente (en web el servidor ya sirve esta página)
    showScreen('controller');
    
    // Conectar automáticamente al WebSocket del servidor actual
    const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
    const wsUrl = `${protocol}${window.location.host}`;
    controllerScreen.autoConnect(wsUrl);
});
        </script>
